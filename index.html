    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Putri comel</title>
    <style>
        /* Reset dasar agar tidak ada jarak sisa */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Background Hitam Full ke seluruh layar */
        body, html {
            width: 100%;
            height: 100%;
            background-color: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }

        /* Wadah Kotak Putih */
        .white-card {
            background-color: #ffffff;
            width: 90%;
            max-width: 400px;
            padding: 60px 40px;
            border-radius: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Desain Tombol Hitam */
        .btn-black {
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #1a1a1a;
            color: #ffffff;
            text-decoration: none;
            width: 100%;
            padding: 18px 0;
            border-radius: 15px;
            font-weight: bold;
            font-size: 16px;
            letter-spacing: 1px;
            transition: transform 0.2s, background 0.2s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        /* Ikon Play */
        .btn-black span {
            margin-right: 10px;
            font-size: 14px;
        }

        @media (hover: hover) {
            .btn-black:hover {
                background-color: #000000;
                transform: scale(1.03);
            }
        }

        .btn-black:active {
            transform: scale(0.95);
        }

        @media (max-width: 380px) {
            .white-card {
                padding: 40px 20px;
            }

            .btn-black {
                font-size: 14px;
            }
        }
    </style>
</head>
